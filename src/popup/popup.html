<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Heatcheck</title>
    <style>
      :root {
        color-scheme: dark;
        /* palette */
        --bg: #0a0a0c;
        --card: #111114;
        --card-border: #1f1f24;
        --chip: #161619;
        --chip-border: #26262b;
        --accent: #ff5a1f;
        --text: #ededf0;
        --text-2: #7c7c84;
        --head: #57575e;
        --ok-text: #5dcaa5;
        --ok-bg: #0f2a22;
        --ok-border: #17453a;
        /* radii & spacing */
        --r-card: 14px;
        --r-chip: 10px;
        --r-pill: 999px;
        --pad-card: 14px 16px;
        --gap: 12px;
      }
      * { box-sizing: border-box; }
      html, body { width: 440px; }
      body {
        margin: 0;
        overflow-x: hidden;
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
      }
      .app { display: flex; flex-direction: column; height: 560px; }

      /* header */
      .hdr {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--card-border);
      }
      .brand { display: flex; align-items: center; gap: 10px; }
      .brand .logo {
        width: 34px; height: 34px; border-radius: var(--r-chip);
        background: var(--chip); border: 1px solid var(--chip-border);
        display: flex; align-items: center; justify-content: center;
      }
      .brand .logo img { width: 28px; height: 28px; display: block; }
      .brand .word { font-size: 16px; font-weight: 800; letter-spacing: 0.3px; line-height: 1; }
      .brand .word span { color: var(--accent); }
      .brand .tag { font-size: 10px; color: var(--head); letter-spacing: 1.4px; margin-top: 3px; text-transform: uppercase; }

      /* language switch */
      .lang-switch { display: inline-flex; border: 1px solid var(--chip-border); border-radius: var(--r-chip); overflow: hidden; background: var(--chip); }
      .lang-switch button {
        border: 0; background: transparent; color: var(--text-2);
        padding: 6px 13px; font-weight: 800; cursor: pointer; font-size: 12px;
      }
      .lang-switch button.active { background: var(--accent); color: #fff; }

      .body { display: flex; flex: 1; min-height: 0; }

      /* sidebar */
      .nav { width: 150px; flex: 0 0 150px; border-right: 1px solid var(--card-border); padding: 12px 8px; overflow-y: auto; }
      .nav-group { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--head); margin: 14px 8px 6px; }
      .nav-group:first-child { margin-top: 2px; }
      .nav-item {
        display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
        border: 1px solid transparent; background: transparent; color: var(--text-2);
        padding: 8px 9px; border-radius: var(--r-chip); cursor: pointer; font-size: 13px; font-weight: 500; margin-bottom: 2px;
      }
      .nav-item .ico { width: 17px; height: 17px; flex: 0 0 17px; stroke: currentColor; }
      .nav-item:hover { color: var(--text); background: var(--chip); }
      .nav-item.active { background: var(--chip); border-color: var(--chip-border); color: var(--text); }
      .nav-item.active .ico { stroke: var(--accent); }

      /* content */
      .content { flex: 1; min-width: 0; padding: 16px; overflow-y: auto; }
      h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 12px; color: var(--head); }
      .sub { color: var(--text-2); margin: 0 0 14px; font-size: 12px; line-height: 1.5; }

      /* card */
      .card {
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
        padding: var(--pad-card); margin-bottom: 10px;
        background: var(--card); border: 1px solid var(--card-border); border-radius: var(--r-card);
      }
      .card.col { flex-direction: column; align-items: stretch; }
      .card .txt b { display: block; font-size: 14px; font-weight: 600; }
      .card .txt span { color: var(--text-2); font-size: 12px; line-height: 1.45; }

      /* inputs */
      label.fld { display: block; margin: 12px 0 5px; font-weight: 600; font-size: 13px; }
      input[type="text"], input[type="password"], input[type="number"] {
        width: 100%; padding: 9px 11px;
        background: var(--chip); color: var(--text); border: 1px solid var(--chip-border); border-radius: var(--r-chip); font-size: 14px;
      }
      input:focus { outline: none; border-color: var(--accent); }
      .hint { color: var(--text-2); font-size: 12px; margin-top: 5px; line-height: 1.45; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; }
      .row > div { flex: 1; min-width: 92px; }

      /* buttons */
      button.btn {
        padding: 9px 15px; border-radius: var(--r-chip); border: 1px solid var(--chip-border);
        background: var(--chip); color: var(--text); font-weight: 600; cursor: pointer; font-size: 13px;
      }
      button.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.btn:hover { filter: brightness(1.12); }
      .btnrow { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
      .status { font-size: 13px; min-height: 18px; }
      .status.ok { color: var(--ok-text); } .status.err { color: #ff6b6b; }

      /* switch */
      .switch { position: relative; width: 46px; height: 26px; flex: 0 0 auto; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider { position: absolute; inset: 0; background: var(--chip-border); border-radius: var(--r-pill); transition: 0.15s; }
      .slider::before { content: ''; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.15s; }
      .switch input:checked + .slider { background: var(--accent); }
      .switch input:checked + .slider::before { transform: translateX(20px); }

      /* version pill */
      .pill-ok {
        padding: 4px 11px; border-radius: var(--r-pill); font-size: 13px; font-weight: 800;
        color: var(--ok-text); background: var(--ok-bg); border: 1px solid var(--ok-border);
      }

      .thresholds { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .thresholds input { text-align: center; }
      .toggles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .toggle { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 13px; }
      .toggle input { width: auto; accent-color: var(--accent); }

      /* delay slider */
      .slide-wrap { margin-top: 12px; }
      .slide-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--text); margin-bottom: 5px; }
      .slide-val { color: var(--accent); font-weight: 800; }
      .slide-scale { display: flex; justify-content: space-between; font-size: 10px; color: var(--head); margin-top: 3px; }
      input[type="range"] { width: 100%; accent-color: var(--accent); }

      /* support */
      .mail-link {
        display: inline-block; margin-top: 5px; padding: 9px 12px;
        background: var(--chip); border: 1px solid var(--chip-border); border-radius: var(--r-chip);
        color: var(--accent); text-decoration: none; font-weight: 600;
      }
      .mail-link:hover { filter: brightness(1.15); }

      /* footer */
      .ftr {
        display: flex; gap: 10px; align-items: center;
        padding: 12px 16px; border-top: 1px solid var(--card-border);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="hdr">
        <div class="brand">
          <div class="logo"><img src="../assets/logo.svg" alt="Heatcheck" /></div>
          <div>
            <div class="word">HEAT<span>CHECK</span></div>
            <div class="tag">FACEIT Stats · CS2</div>
          </div>
        </div>
        <div class="lang-switch">
          <button type="button" data-lang="en">EN</button>
          <button type="button" data-lang="ru">RU</button>
        </div>
      </header>

      <div class="body">
        <nav class="nav">
          <div class="nav-group" data-i18n="groupExtension"></div>
          <button class="nav-item active" data-section="general">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M4 6h10"/><path d="M18 6h2"/><path d="M6 12a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M4 12h2"/><path d="M10 12h10"/><path d="M15 18a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M4 18h11"/><path d="M19 18h1"/></svg>
            <span data-i18n="navGeneral"></span>
          </button>
          <button class="nav-item" data-section="api">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 7.5v.001"/><path d="M9 15l6 -6"/><path d="M13.5 5.5l5 5a2.4 2.4 0 0 1 0 3l-2 2a2.4 2.4 0 0 1 -3 0l-5 -5l-4.5 4.5v2h-2v-2l7 -7l4.5 -2.5z"/></svg>
            <span data-i18n="navApi"></span>
          </button>
          <button class="nav-item" data-section="form">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c2 -2.96 0 -7 -1 -8c0 3.038 -1.773 4.741 -3 6c-1.226 1.26 -2 3.24 -2 5a6 6 0 1 0 12 0c0 -1.532 -1.056 -3.94 -2 -5c-1.786 3 -2.791 3 -4 2z"/></svg>
            <span data-i18n="navForm"></span>
          </button>

          <div class="nav-group" data-i18n="groupFaceit"></div>
          <button class="nav-item" data-section="display">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"/><path d="M21 12c-2.4 4 -5.4 6 -9 6c-3.6 0 -6.6 -2 -9 -6c2.4 -4 5.4 -6 9 -6c3.6 0 6.6 2 9 6"/></svg>
            <span data-i18n="navDisplay"></span>
          </button>
          <button class="nav-item" data-section="features">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18a2 2 0 0 1 2 2a2 2 0 0 1 2 -2a2 2 0 0 1 -2 -2a2 2 0 0 1 -2 2z"/><path d="M16 6a2 2 0 0 1 2 2a2 2 0 0 1 2 -2a2 2 0 0 1 -2 -2a2 2 0 0 1 -2 2z"/><path d="M9 18a6 6 0 0 1 6 -6a6 6 0 0 1 -6 -6a6 6 0 0 1 -6 6a6 6 0 0 1 6 6z"/></svg>
            <span data-i18n="navFeatures"></span>
          </button>
          <button class="nav-item" data-section="auto">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3l0 7l6 0l-8 11l0 -7l-6 0l8 -11"/></svg>
            <span data-i18n="navAuto"></span>
          </button>

          <div class="nav-group" data-i18n="groupOther"></div>
          <button class="nav-item" data-section="support">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 1 0 0 18a9 9 0 0 0 0 -18"/><path d="M12 17l0 .01"/><path d="M12 13.5a1.5 1.5 0 0 1 1 -1.5a2.6 2.6 0 1 0 -3 -4"/></svg>
            <span data-i18n="navSupport"></span>
          </button>
          <button class="nav-item" data-section="about">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/><path d="M12 8l.01 0"/><path d="M11 12l1 0l0 4l1 0"/></svg>
            <span data-i18n="navAbout"></span>
          </button>
        </nav>

        <main class="content">
          <!-- GENERAL -->
          <section data-panel="general">
            <div class="card">
              <div class="txt"><b data-i18n="enabled"></b><span data-i18n="enabledDesc"></span></div>
              <label class="switch"><input type="checkbox" id="enabled" /><span class="slider"></span></label>
            </div>
            <div class="card">
              <div class="txt"><b data-i18n="language"></b><span data-i18n="languageDesc"></span></div>
              <div class="lang-switch">
                <button type="button" data-lang="en">EN</button>
                <button type="button" data-lang="ru">RU</button>
              </div>
            </div>
            <div class="card">
              <div class="txt"><b data-i18n="version"></b><span data-i18n="versionDesc"></span></div>
              <span id="version" class="pill-ok">0.1.0</span>
            </div>
          </section>

          <!-- API & CACHE -->
          <section data-panel="api" hidden>
            <h2 data-i18n="navApi"></h2>
            <label class="fld" data-i18n="apiKey"></label>
            <input id="apiKey" type="password" autocomplete="off" />
            <div class="hint" data-i18n="apiKeyHint"></div>
            <div class="btnrow">
              <button id="toggleKey" class="btn" type="button" data-i18n="showKey"></button>
              <button id="checkKey" class="btn primary" type="button" data-i18n="checkKey"></button>
              <span id="keyStatus" class="status"></span>
            </div>

            <label class="fld" data-i18n="selfNick"></label>
            <input id="selfNick" type="text" autocomplete="off" data-i18n-ph="selfNick" />
            <div class="hint" data-i18n="selfNickHint"></div>

            <label class="fld" data-i18n="ttl"></label>
            <input id="ttl" type="number" min="0" step="1" />
            <div class="hint" data-i18n="ttlHint"></div>
            <div class="btnrow">
              <button id="clearCache" class="btn" type="button" data-i18n="clearCache"></button>
              <span id="cacheStatus" class="status"></span>
            </div>
          </section>

          <!-- FORM LEVEL -->
          <section data-panel="form" hidden>
            <h2 data-i18n="navForm"></h2>
            <p class="sub" data-i18n="formIntro"></p>
            <div class="row">
              <div><label class="fld" data-i18n="matchWindow"></label><input id="matchWindow" type="number" min="1" max="100" step="1" /></div>
              <div><label class="fld" data-i18n="recencyDecay"></label><input id="recencyDecay" type="number" min="0" max="1" step="0.01" /></div>
              <div><label class="fld" data-i18n="winrateWeight"></label><input id="winrateWeight" type="number" min="0" max="2" step="0.01" /></div>
            </div>
            <label class="fld" data-i18n="thresholds"></label>
            <div id="thresholds" class="thresholds"></div>
            <div class="hint" data-i18n="thresholdsHint"></div>
          </section>

          <!-- DISPLAY -->
          <section data-panel="display" hidden>
            <h2 data-i18n="metricsTitle"></h2>
            <div class="toggles">
              <label class="toggle"><input type="checkbox" data-key="formLevel" /><span data-i18n="mFormLevel"></span></label>
              <label class="toggle"><input type="checkbox" data-key="winrate" /><span data-i18n="mWinrate"></span></label>
              <label class="toggle"><input type="checkbox" data-key="kd" /><span data-i18n="mKd"></span></label>
              <label class="toggle"><input type="checkbox" data-key="kr" /><span data-i18n="mKr"></span></label>
              <label class="toggle"><input type="checkbox" data-key="hltv" /><span data-i18n="mHltv"></span></label>
              <label class="toggle"><input type="checkbox" data-key="adr" /><span data-i18n="mAdr"></span></label>
              <label class="toggle"><input type="checkbox" data-key="matches" /><span data-i18n="mMatches"></span></label>
              <label class="toggle"><input type="checkbox" data-key="encounters" /><span data-i18n="mEncounters"></span></label>
              <label class="toggle"><input type="checkbox" data-key="party" /><span data-i18n="mParty"></span></label>
              <label class="toggle"><input type="checkbox" data-key="flag" /><span data-i18n="mFlag"></span></label>
              <label class="toggle"><input type="checkbox" data-key="recent" /><span data-i18n="mRecent"></span></label>
              <label class="toggle"><input type="checkbox" data-key="mapStats" /><span data-i18n="mMapStats"></span></label>
            </div>
          </section>

          <!-- SIGNATURE FEATURES -->
          <section data-panel="features" hidden>
            <h2 data-i18n="navFeatures"></h2>
            <div class="card">
              <div class="txt"><b data-i18n="featTeamOdds"></b><span data-i18n="featTeamOddsDesc"></span></div>
              <label class="switch"><input type="checkbox" data-key="teamOdds" /><span class="slider"></span></label>
            </div>
            <div class="card">
              <div class="txt"><b data-i18n="featSmurf"></b><span data-i18n="featSmurfDesc"></span></div>
              <label class="switch"><input type="checkbox" data-key="smurf" /><span class="slider"></span></label>
            </div>
          </section>

          <!-- AUTOMATION -->
          <section data-panel="auto" hidden>
            <h2 data-i18n="navAuto"></h2>
            <div class="card">
              <div class="txt"><b data-i18n="autoCopyConnect"></b><span data-i18n="autoCopyConnectDesc"></span></div>
              <label class="switch"><input type="checkbox" data-auto="copyConnect" /><span class="slider"></span></label>
            </div>

            <div class="card col">
              <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
                <div class="txt"><b data-i18n="autoConnect"></b><span data-i18n="autoConnectDesc"></span></div>
                <label class="switch"><input type="checkbox" data-auto="connect" /><span class="slider"></span></label>
              </div>
              <div class="slide-wrap">
                <div class="slide-head"><span data-i18n="delay"></span><span id="connectDelayVal" class="slide-val"></span></div>
                <input id="connectDelay" type="range" min="1" max="120" step="1" />
                <div class="slide-scale"><span>1s</span><span>120s</span></div>
              </div>
            </div>

            <div class="card col">
              <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
                <div class="txt"><b data-i18n="autoAccept"></b><span data-i18n="autoAcceptDesc"></span></div>
                <label class="switch"><input type="checkbox" data-auto="accept" /><span class="slider"></span></label>
              </div>
              <div class="slide-wrap">
                <div class="slide-head"><span data-i18n="delay"></span><span id="acceptDelayVal" class="slide-val"></span></div>
                <input id="acceptDelay" type="range" min="1" max="120" step="1" />
                <div class="slide-scale"><span>1s</span><span>120s</span></div>
              </div>
            </div>
          </section>

          <!-- SUPPORT -->
          <section data-panel="support" hidden>
            <h2 data-i18n="supportTitle"></h2>
            <p class="sub" data-i18n="supportText"></p>
            <label class="fld" data-i18n="supportMailLabel"></label>
            <a id="supportMail" class="mail-link" href="mailto:angelokkus@gmail.com">angelokkus@gmail.com</a>
            <div class="btnrow">
              <button id="supportSite" class="btn" type="button" disabled></button>
            </div>
          </section>

          <!-- ABOUT -->
          <section data-panel="about" hidden>
            <h2>Heatcheck</h2>
            <p class="sub" data-i18n="aboutText"></p>
            <p class="sub" data-i18n="aboutForm"></p>
          </section>
        </main>
      </div>

      <footer class="ftr">
        <button id="save" class="btn primary" type="button" data-i18n="save"></button>
        <button id="reset" class="btn" type="button" data-i18n="reset"></button>
        <span id="saveStatus" class="status"></span>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
